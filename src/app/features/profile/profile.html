<div class="grid-container">
  <section class="education-card">
    <h2 id="edu-title">Formación Académica</h2>
    <div class="edu-content">
      <h3>{{ education().degree }}</h3>
      <p class="institution">{{ education().institution }}</p>
      <p class="year">{{ education().year }}</p>
      
      <ul class="highlights-list">
        @for (item of education().highlights; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    </div>
  </section>

  <section class="skills-card">
    <h2>Habilidades Técnicas</h2>
    <div class="skills-grid">
      @for (skill of techSkills(); track skill.name) {
        <div class="skill-tag">
          <span class="skill-name">{{ skill.name }}</span>
          <span [class]="'level-' + skill.level.toLowerCase()">
            {{ skill.level }}
          </span>
        </div>
      }
    </div>
  </section>
</div>
