<div class="grid-container">
  <section class="education-card">
    <h2 id="edu-title">Formación Académica</h2>
    <div class="edu-content">
      @for (i of education(); track i) {
        <h3>{{ i.degree }}</h3>
        <p class="institution">{{ i.institution }}</p>
        <p class="year">{{ i.year }}</p>

        <ul class="highlights-list">
          @for (j of i.highlights; track j) {
            <li>{{ j }}</li>
          }
        </ul>
      }
    </div>
  </section>

  <section class="skills-card">
    <h2>Habilidades Técnicas</h2>
    <div class="skills-grid">
      @for (skill of techSkills(); track skill.name) {
        <div class="skill-tag">
          <span class="skill-name">{{ skill.name }}</span>
          <span [class]="'level-' + skill.level.toLowerCase()">
            {{ skill.level }}
          </span>
        </div>
      }
    </div>
  </section>
</div>
