<div class="profile-card">
  <div class="content">
    <h1 id="who-am-i-title" class="title">
      {{ userProfile().fullName }}
    </h1>
    
    <p [class.highlight]="true" class="subtitle">
      {{ userProfile().professionalTitle }}
    </p>

    <p class="description">
      {{ userProfile().biography }}
    </p>

    <footer class="footer-info">
      <span aria-label="Ubicación">
        <img src="icons/location-pin.svg" alt="" style="height: 30px; width: 30px;">
        {{ userProfile().location }}</span>
    </footer>
  </div>
</div>
