<header class="main-header">
  <div class="header-container">
    <div class="logo" (click)="scrollToSection('home')">
      <span class="prompt">></span> IVAN_CABALLERO<span class="blink">_</span>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <i class="fas" [class.fa-bars]="!isMenuOpen()" [class.fa-times]="isMenuOpen()"></i>
    </button>

    <nav class="nav-menu" [class.open]="isMenuOpen()">
      <ul>
        <li><a (click)="scrollToSection('profile')">Perfil</a></li>
        <li><a (click)="scrollToSection('projects')">Proyectos</a></li>
        <li><a (click)="scrollToSection('contact')">Contacto</a></li>
        <li class="mobile-only">
          <a href="/documents/CV_Ivan_Caballero.pdf" download class="btn-cv">Descargar CV</a>
        </li>
      </ul>
    </nav>

    <div class="actions desktop-only">
      <a href="/documents/CV_Ivan_Caballero.pdf" download class="btn-cv">
        <i class="fas fa-file-pdf"></i> Descargar CV
      </a>
    </div>
  </div>
</header>
