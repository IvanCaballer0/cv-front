@if (!isLoaded()) {
  <div class="security-loader">
    <div class="loader-terminal">
      <p><span class="green">[INFO]</span> Verificando integridad del sistema...</p>
      <p><span class="green">[INFO]</span> Cargando portafolio v1.0...</p>
      <p><span class="blue">[AUTH]</span> Acceso: Invitado.</p>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
  </div>
}

<app-header />

<main>
  <app-who-am-i id="home" />

  <app-profile id="profile" />

  @defer (on viewport) {
    <app-projects id="projects" />
  } @placeholder (minimum 800ms) {
    <div class="section-placeholder">
      <p>Preparando proyectos técnicos...</p>
    </div>
  }
  
  <section id="contact"></section>
</main>

<app-footer />
